<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - Portal do Professor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dashboard">

    <div class="sidebar">
        <div class="sidebar-arrow">➔</div>
        <div class="sidebar-content">
            <h2 id="tituloMateria">Matéria</h2>
            <ul>
                <li onclick="mostrar('notas')">📝 Lançar Notas</li>
                <li onclick="mostrar('lista')">📊 Ver Lista</li>
                <li onclick="logout()" class="btn-logout">🚪 Sair</li>
            </ul>
        </div>
    </div>

    <div class="main">
        <div class="dashboard-bg"></div>

        <div id="notas" class="card notas-card-grande">
            <div class="card-header-decor">
                <span class="emoji-decor">🍎</span>
                <span class="emoji-decor">📏</span>
            </div>

            <h2>📚 Registro de Avaliação</h2>
            <p>Insira os dados do aluno abaixo</p>

            <div class="form-container-grande">
                <div class="form-row-dupla">
                    <div class="input-group" style="flex: 2;">
                        <label>👤 Nome do Aluno</label>
                        <input type="text" id="nome" placeholder="Nome completo">
                    </div>
                    <div class="input-group" style="flex: 1;">
                        <label>🏫 Turma</label>
                        <input type="text" id="turma" placeholder="Ex: 9º A">
                    </div>
                </div>

                <div class="form-row-dupla">
                    <div class="input-group">
                        <label>📝 Nota Final</label>
                        <input type="number" id="nota" placeholder="0-10" min="0" max="10" step="0.1">
                    </div>
                    <div class="input-group">
                        <label>📅 Período</label>
                        <select id="bimestre">
                            <option>1º Bimestre</option>
                            <option>2º Bimestre</option>
                            <option>3º Bimestre</option>
                            <option>4º Bimestre</option>
                        </select>
                    </div>
                </div>

                <button class="btn-salvar" onclick="addNota()">💾 Salvar Nota</button>
            </div>
        </div>

        <div id="lista" class="card listagem-card hidden">
            <h2>📊 Lista de Alunos e Notas</h2>
            <p>Relação completa de notas lançadas para esta matéria.</p>
            <table>
                <thead>
                    <tr>
                        <th>Aluno</th>
                        <th>Turma</th>
                        <th>Bimestre</th>
                        <th>Nota</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="tabela">
                    </tbody>
            </table>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
