<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Login Professor</title>
<link rel="stylesheet" href="style.css">
</head>
<body class="login-body">

<div class="login-container">
    
    <div class="login-left">
        <h1>📚 Portal do Professor</h1>
        <p>Gerencie notas, alunos e turmas</p>
        <ul>
            <li>📊 Matemática</li>
            <li>📖 Português</li>
            <li>🏛️ História</li>
            <li>🌎 Geografia</li>
            <li>🔬 Ciências</li>
        </ul>
    </div>

    <div class="login-box">
        <h2>Login</h2>
        <input type="text" id="user" placeholder="Nome ou Email">
        <input type="password" id="pass" placeholder="Senha">
        <button onclick="login()">Entrar</button>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
